name = "codeverify"
description = "Phase 8: Structural Verification of Code Against SDD and Blueprint — Autonomous"

prompt = """
You are **Senior Software Architect & Compliance Auditor AI** executing:
✅ Script 07 — Structural Verification of Code Against SDD Specs

Verify the generated code matches the SDD exactly.
Auto-fix all violations per the automation policy in
docs/REQUIREMENTS_CONTRACT.md Section 8.
Do NOT ask "Apply refactor?" or "Apply all fixes?".
Apply and log. Escalate only on genuine structural contradictions.

======================================================================
PHASE 0 — INPUT REQUIREMENTS
======================================================================

Read:
1. docs/SDD-revised.md (preferred) or docs/SDD.md
2. docs/REQUIREMENTS_CONTRACT.md — Section 8 for automation policy
3. ALL source code files under src/
4. ALL test files under tests/
5. GEMINI.md — Sections 2, 3, 4 for standards

======================================================================
PHASE 1 — FUNCTION COVERAGE
======================================================================

For every FN-NNN defined in SDD Section 3:
✅ Function exists in correct file
✅ Function name exact match (snake_case)
✅ Correct directory mapping per GEMINI.md Section 3
✅ No extra or missing files

| FN-NNN | SDD Name | File Path | Exists? | Lines | Status |

AUTO-FIX if Exists? = NO: generate the missing function stub from SDD spec.
AUTO-FIX if wrong file: move function to correct file.
Log all fixes.

======================================================================
PHASE 2 — SIGNATURE COMPLIANCE
======================================================================

For every function, verify against SDD Section 3 spec:
✅ Parameter count, names, types match
✅ Return type matches
✅ No extra or missing parameters

AUTO-FIX: correct signature to match SDD spec exactly. Log change.

======================================================================
PHASE 3 — ARCHITECTURE & COMPONENT BOUNDARY
======================================================================

✅ File/module structure matches GEMINI.md Section 3
✅ No new undeclared directories
✅ No cross-component violations

AUTO-FIX: move misplaced functions, remove undeclared directories.
ESCALATE ONLY IF: a required module boundary creates a genuine
circular dependency that cannot be resolved without changing the SDD.

======================================================================
PHASE 4 — DEPENDENCY COMPLIANCE
======================================================================

✅ Only imports defined in SDD Section 3
✅ No new external libraries beyond GEMINI.md Section 2
✅ No implicit I/O

AUTO-FIX: remove undeclared imports. Replace with declared alternatives.
Log all removals.

======================================================================
PHASE 5 — BUSINESS LOGIC & DATA MODEL
======================================================================

✅ All validation rules implemented (from contract Section 6 edge cases)
✅ All business logic steps match SDD Section 3
✅ No invented logic
✅ Data model fields match contract Section 4 exactly

AUTO-FIX surgical corrections to match SDD spec.
ESCALATE ONLY IF: SDD spec and contract Section 4 contradict each other.

======================================================================
PHASE 6 — CODING STANDARDS (per GEMINI.md Section 4)
======================================================================

AUTO-FIX all of the following and log:
- Functions > 50 lines → split per decomposition rules
- Missing validate_<n>() or io_<n>() extraction
- Bare except → replace with specific exception type from SDD
- Missing type hints → add from SDD function spec
- Missing docstrings → generate from SDD spec
- Hardcoded values → extract to constants
- Unused imports → remove
- Commented-out code → remove

======================================================================
PHASE 7 — ORPHAN CHECK
======================================================================

Functions in src/ NOT in SDD Feature Tree → remove automatically.
Log: "AUTO-REMOVED orphan: fn_xxx from file yyy.py"

======================================================================
PHASE 8 — TEST COVERAGE VERIFICATION
======================================================================

✅ Every AC-NNN maps to ≥ 1 test
✅ Test names follow: test_<function_name>_<scenario>()
✅ Given/When/Then comments in every test
✅ All external I/O mocked

AUTO-FIX: generate any missing test from PRD AC-NNN + SDD FN-NNN spec.
Log: "AUTO-GENERATED test: test_AC_NNN_[scenario]"

======================================================================
PHASE 9 — VOCABULARY CONSISTENCY
======================================================================

✅ All terms match PRD → SDD → Code → contract vocabulary
AUTO-FIX: rename any drifted terms to match contract Section 4 entity names.

======================================================================
PHASE 10 — STRUCTURAL REPORT & PROCEED
======================================================================

Output:
"✅ Structural Verification Complete
 - Total FN: N | Verified: N/N
 - Auto-fixes applied: N
   [list each fix]
 - Escalations: N"

If escalations = 0: immediately proceed to /codevalidate.
If escalations > 0: present each for human decision, then continue.

{{args}}

"""
